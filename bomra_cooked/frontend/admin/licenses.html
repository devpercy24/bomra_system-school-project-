<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoMRA - All Licenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bomra.css">
  <style>
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:12px; padding:2rem; max-width:500px; width:92%; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
    .modal-box h3 { margin:0 0 1rem; font-size:1.1rem; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem 1rem; font-size:0.9rem; }
    .detail-item .label { color:var(--text-light); font-size:0.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
    .modal-actions { display:flex; gap:0.75rem; margin-top:1.5rem; flex-wrap:wrap; }
  </style>
</head>
<body><nav class="page-nav">
  <div class="page-nav__brand">BoMRA <span>Botswana Medicines Regulatory Authority</span></div>
</nav>

<!-- License detail modal -->
<div id="lic-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modal-title">License Details</h3>
    <div id="modal-body" class="detail-grid"></div>
    <div class="modal-actions">
      <button id="modal-renew-btn" class="btn btn-secondary" style="display:none" onclick="goManage('renew')">Renew</button>
      <button id="modal-suspend-btn" class="btn btn-danger" style="display:none" onclick="goManage('suspend')">Suspend</button>
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="page-top">
    <button class="btn btn-back" onclick="location.href='../dashboard/admin.html'">Back to Dashboard</button>
    <h1>License Registry</h1>
  </div>
  <div class="form-actions" style="margin-bottom:1.5rem;">
    <button class="btn btn-secondary" onclick="location.href='manage_license.html'">Issue / Renew / Suspend a License</button>
  </div>
  <div id="licenses-list" class="table-wrap"><p class="state-msg">Loading licenses...</p></div>
</div>
<script src="../js/auth.js"></script>
<script>
guardPage("admin");
let currentLic = null;

function openModal(lic) {
  currentLic = lic;
  document.getElementById('modal-title').textContent = 'License ' + lic.license_number;
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-item"><div class="label">License ID</div><div>${lic.license_id}</div></div>
    <div class="detail-item"><div class="label">License Number</div><div>${lic.license_number}</div></div>
    <div class="detail-item"><div class="label">Holder Type</div><div>${lic.holder_type}</div></div>
    <div class="detail-item"><div class="label">Holder ID</div><div>${lic.holder_id}</div></div>
    <div class="detail-item"><div class="label">Status</div><div><span class="badge badge-${lic.status}">${lic.status}</span></div></div>
    <div class="detail-item"><div class="label">Expires</div><div>${lic.expires_at || 'N/A'}</div></div>
    <div class="detail-item"><div class="label">Issued By</div><div>${lic.issued_by_name}</div></div>
    <div class="detail-item"><div class="label">Issued At</div><div>${lic.issued_at}</div></div>
  `;
  const isActive = lic.status === 'active';
  document.getElementById('modal-renew-btn').style.display = isActive ? 'inline-flex' : 'none';
  document.getElementById('modal-suspend-btn').style.display = isActive ? 'inline-flex' : 'none';
  document.getElementById('lic-modal').classList.add('open');
}
function closeModal() { document.getElementById('lic-modal').classList.remove('open'); currentLic = null; }
function goManage() { location.href = 'manage_license.html'; }

apiGet('api/admin/get_licenses.php')
  .then(data => {
    const div = document.getElementById('licenses-list');
    if (data.status !== 'success' || !data.data.length) {
      div.innerHTML = '<p class="state-msg">No licenses found.</p>';
      return;
    }
    let html = '<table class="data-table"><thead><tr><th>ID</th><th>License Number</th><th>Holder Type</th><th>Status</th><th>Expires</th><th>Issued By</th><th>Action</th></tr></thead><tbody>';
    data.data.forEach(lic => {
      const licJson = JSON.stringify(lic).replace(/'/g, "&#39;");
      html += `<tr>
        <td>${lic.license_id}</td>
        <td>${lic.license_number}</td>
        <td>${lic.holder_type}</td>
        <td><span class="badge badge-${lic.status}">${lic.status}</span></td>
        <td>${lic.expires_at || 'N/A'}</td>
        <td>${lic.issued_by_name}</td>
        <td><button class="btn btn-sm btn-secondary" onclick='openModal(${licJson})'>View</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    div.innerHTML = html;
  })
  .catch(() => {
    document.getElementById('licenses-list').innerHTML = '<p class="state-msg">Failed to load licenses.</p>';
  });
</script>
</body>
</html>
