<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoMRA - All Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bomra.css">
  <style>
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:12px; padding:2rem; max-width:480px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
    .modal-box h3 { margin:0 0 0.75rem; font-size:1.1rem; }
    .modal-box .detail-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; font-size:0.9rem; }
    .modal-box .detail-label { font-weight:600; min-width:100px; color:var(--text-light); }
    .modal-actions { display:flex; gap:0.75rem; margin-top:1.25rem; }
    .inline-role-select { padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:0.85rem; background:var(--surface); color:var(--text); cursor:pointer; }
    .saving-spinner { font-size:0.8rem; color:var(--text-light); font-style:italic; min-width:55px; }
    .role-actions { display:flex; gap:6px; align-items:center; }
  </style>
</head>
<body><nav class="page-nav">
  <div class="page-nav__brand">BoMRA <span>Botswana Medicines Regulatory Authority</span></div>
</nav>

<!-- User detail modal -->
<div id="user-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modal-title">User Details</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="page-top">
    <button class="btn btn-back" onclick="location.href='../dashboard/admin.html'">Back to Dashboard</button>
    <h1>All Registered Users</h1>
  </div>
  <div id="users-list" class="table-wrap"><p class="state-msg">Loading users...</p></div>
</div>
<script src="../js/auth.js"></script>
<script>
guardPage("admin");

function openModal(u) {
  document.getElementById('modal-title').textContent = u.name;
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">User ID</span><span>${u.user_id}</span></div>
    <div class="detail-row"><span class="detail-label">Email</span><span>${u.email}</span></div>
    <div class="detail-row"><span class="detail-label">Role</span><span class="badge badge-${u.role}">${u.role}</span></div>
    <div class="detail-row"><span class="detail-label">Registered</span><span>${u.created_at}</span></div>
  `;
  document.getElementById('user-modal').classList.add('open');
}
function closeModal() { document.getElementById('user-modal').classList.remove('open'); }

async function changeRole(userId, selectEl) {
  const role = selectEl.value;
  const originalValue = selectEl.dataset.original;
  if (role === originalValue) return;
  const statusEl = selectEl.parentElement.querySelector('.saving-spinner');
  if (statusEl) statusEl.textContent = 'Saving\u2026';
  selectEl.disabled = true;
  try {
    const data = await apiPost('api/admin/manage_users.php', { user_id: parseInt(userId), role: role });
    if (data.status === 'success') {
      selectEl.dataset.original = role;
      const row = selectEl.closest('tr');
      const badge = row ? row.querySelector('.role-badge') : null;
      if (badge) { badge.className = 'badge badge-' + role + ' role-badge'; badge.textContent = role; }
      if (statusEl) { statusEl.textContent = '\u2713 Saved'; setTimeout(() => { if(statusEl) statusEl.textContent = ''; }, 2000); }
    } else {
      alert(data.message || 'Failed to update role.');
      selectEl.value = originalValue;
      if (statusEl) statusEl.textContent = '';
    }
  } catch(e) {
    alert('Network error: ' + e.message);
    selectEl.value = originalValue;
    if (statusEl) statusEl.textContent = '';
  } finally {
    selectEl.disabled = false;
  }
}

apiGet('api/admin/manage_users.php')
  .then(data => {
    const div = document.getElementById('users-list');
    if (data.status !== 'success' || !data.data.length) {
      div.innerHTML = '<p class="state-msg">No users found.</p>';
      return;
    }
    const allRoles = ['supplier','facility','inspector'];
    let html = '<table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Registered</th><th>Actions</th></tr></thead><tbody>';
    data.data.forEach(u => {
      const isAdmin = u.role === 'admin';
      const roleControl = isAdmin
        ? '<em style="font-size:0.8rem;color:var(--text-light)">Admin</em>'
        : `<div class="role-actions">
            <select class="inline-role-select" data-original="${u.role}" onchange="changeRole(${u.user_id}, this)">
              ${allRoles.map(r => `<option value="${r}"${r===u.role?' selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
            </select>
            <span class="saving-spinner"></span>
           </div>`;
      const userJson = JSON.stringify(u).replace(/'/g, "&#39;");
      html += `<tr>
        <td>${u.user_id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td><span class="badge badge-${u.role} role-badge">${u.role}</span></td>
        <td>${u.created_at}</td>
        <td>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-sm btn-secondary" onclick='openModal(${userJson})'>View</button>
            ${roleControl}
          </div>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    div.innerHTML = html;
  })
  .catch(() => {
    document.getElementById('users-list').innerHTML = '<p class="state-msg">Failed to load users.</p>';
  });
</script>
</body>
</html>
