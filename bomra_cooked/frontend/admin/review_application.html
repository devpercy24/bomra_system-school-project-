<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoMRA - Review Application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bomra.css">
</head>
<body><nav class="page-nav">
  <div class="page-nav__brand">BoMRA <span>Botswana Medicines Regulatory Authority</span></div>
</nav>
<div class="page-wrap">
  <div class="page-top">
    <button class="btn btn-back" onclick="location.href='../dashboard/admin.html'">Back to Dashboard</button>
    <h1>Review Medicine Registration Applications</h1>
  </div>
  <div class="page-desc">
    Click <strong>Review</strong> on any pending application to approve or reject it. You may add optional notes before submitting your decision.
  </div>

  <div id="review-panel" class="action-panel" style="display:none;">
    <h3 id="review-title">Review Application</h3>
    <p id="review-desc"></p>
    <div class="form-row">
      <label for="status">Decision</label>
      <select id="status" required>
        <option value="">-- Select decision --</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div class="form-row">
      <label for="notes">Review Notes (optional)</label>
      <textarea id="notes" placeholder="Enter notes about your decision"></textarea>
    </div>
    <input type="hidden" id="selected_application_id">
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
      <button class="btn btn-secondary" onclick="closeReviewPanel()">Cancel</button>
    </div>
  </div>

  <div id="applications-list" class="table-wrap"><p class="state-msg">Loading applications...</p></div>
</div>
<script src="../js/auth.js"></script>
<script>
guardPage("admin");
let currentAppId = null;

function closeReviewPanel() {
  document.getElementById('review-panel').style.display = 'none';
  currentAppId = null;
}

function openReview(appId, medicineName, batchNumber) {
  currentAppId = appId;
  document.getElementById('review-title').textContent = 'Review Application #' + appId;
  document.getElementById('review-desc').textContent = 'Medicine: ' + medicineName + '  |  Batch: ' + batchNumber;
  document.getElementById('status').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('review-panel').style.display = 'block';
  document.getElementById('review-panel').scrollIntoView({ behavior: 'smooth' });
}

async function submitReview() {
  if (!currentAppId) return;
  const status = document.getElementById('status').value;
  const notes  = document.getElementById('notes').value.trim();
  if (!status) { alert('Please select a decision.'); return; }
  try {
    const data = await apiPost('api/admin/review_application.php', { application_id: currentAppId, status, notes });
    alert(data.message || (data.status === 'success' ? 'Review submitted.' : 'Failed.'));
    if (data.status === 'success') { closeReviewPanel(); loadApplications(); }
  } catch(e) { alert('Network error: ' + e.message); }
}

async function loadApplications() {
  const div = document.getElementById('applications-list');
  div.innerHTML = '<p class="state-msg">Loading applications...</p>';
  try {
    const data = await apiGet('api/admin/get_applications.php');
    if (data.status !== 'success' || !data.data.length) {
      div.innerHTML = '<p class="state-msg">No applications found.</p>';
      return;
    }
    let html = '<table class="data-table"><thead><tr><th>ID</th><th>Medicine</th><th>Manufacturer</th><th>Batch No.</th><th>Expiry</th><th>Qty</th><th>Supplier</th><th>Submitted By</th><th>Status</th><th>Review Date</th><th>Action</th></tr></thead><tbody>';
    data.data.forEach(app => {
      const actions = app.status === 'pending'
        ? `<button class="btn btn-sm btn-primary" onclick="openReview(${app.application_id}, ${JSON.stringify(app.medicine_name)}, ${JSON.stringify(app.batch_number)})">Review</button>`
        : '<em style="font-size:0.8rem;color:var(--text-light)">Reviewed</em>';
      html += `<tr>
        <td>${app.application_id}</td>
        <td>${app.medicine_name}</td>
        <td>${app.manufacturer}</td>
        <td>${app.batch_number}</td>
        <td>${app.expiry_date}</td>
        <td>${app.quantity}</td>
        <td>${app.supplier_name}</td>
        <td>${app.submitter_name}</td>
        <td><span class="badge badge-${app.status}">${app.status}</span></td>
        <td>${app.review_date || 'Not yet reviewed'}</td>
        <td>${actions}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    div.innerHTML = html;
  } catch(e) {
    div.innerHTML = '<p class="state-msg">Failed to load applications. Please try again.</p>';
  }
}
loadApplications();
</script>
</body>
</html>
