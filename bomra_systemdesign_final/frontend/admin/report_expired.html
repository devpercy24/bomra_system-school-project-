<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoMRA - Expired Medicines Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bomra.css">
</head>
<body><nav class="page-nav">
  <div class="page-nav__brand">BoMRA <span>Botswana Medicines Regulatory Authority</span></div>
</nav>
<div class="page-wrap">
  <div class="page-top">
    <button class="btn btn-back" onclick="location.href='../dashboard/admin.html'">Back to Dashboard</button>
    <h1>Expired Medicines in Stock</h1>
  </div>
  <div id="expired-list" class="table-wrap"><p class="state-msg">Loading...</p></div>
</div>
<script src="../js/auth.js"></script>
<script>
guardPage("admin");
apiGet('api/reports/statistics.php?type=expired_medicines')
  .then(data => {
    const div = document.getElementById('expired-list');
    if (data.status !== 'success' || !data.data.length) {
      div.innerHTML = '<p class="state-msg">No expired medicines found in stock.</p>'; return;
    }
    let html = '<table class="data-table"><thead><tr><th>Medicine</th><th>Manufacturer</th><th>Batch No.</th><th>Expiry Date</th><th>Supplier</th><th>Stock Qty</th></tr></thead><tbody>';
    data.data.forEach(m => {
      html += `<tr><td>${m.medicine_name}</td><td>${m.manufacturer}</td><td>${m.batch_number}</td><td>${m.expiry_date}</td><td>${m.supplier_name}</td><td>${m.stock_qty}</td></tr>`;
    });
    html += '</tbody></table>';
    div.innerHTML = html;
  })
  .catch(() => { document.getElementById('expired-list').innerHTML = '<p class="state-msg">Failed to load report.</p>'; });
</script>
</body>
</html>
